<!DOCTYPE html>
<html lang="pt-BR">
<head><style>
@font-face {
  font-family: "Optimistic";
  font-style: normal;
  font-weight: 400 600;
  font-display: swap;
  src: url("/fonts/OptimisticAI_VF_Optimized.woff2") format("woff2");
}
@font-face {
  font-family: "Optimistic Mono";
  font-style: normal;
  font-weight: 400;
  font-display: swap;
  src: url("/fonts/OptimisticMono_W_TextRegular.woff2") format("woff2");
}
:where(html) {
  font-family: "Optimistic", system-ui, sans-serif;
}
:where(code, pre, kbd, samp) {
  font-family: "Optimistic Mono", ui-monospace, monospace;
}
</style>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Meu Calendário v9</title>
<style>
* { box-sizing: border-box; }
html, body { overflow-x: hidden; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Inter, sans-serif;
  background: #ffffff;
  color: #0f172a;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
.app {
  max-width: 520px;
  margin: 0 auto;
  padding: 16px;
  width: 100%;
}
header h1 {
  font-size: 22px;
  font-weight: 800;
  text-align: center;
  margin: 4px 0 16px;
  letter-spacing: -0.3px;
}
.nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 14px;
}
.nav button {
  background: #f1f5f9;
  border: none;
  width: 44px;
  height: 44px;
  border-radius: 12px;
  font-size: 20px;
  cursor: pointer;
  color: #0f172a;
  flex-shrink: 0;
  transition: background .15s;
}
.nav button:active { background: #e2e8f0; }
#monthYear {
  font-size: 18px;
  font-weight: 700;
  margin: 0;
  text-align: center;
  flex: 1;
  text-transform: capitalize;
}
.calendar {
  width: 100%;
}
.weekdays, .grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
  width: 100%;
  box-sizing: border-box;
}
.weekdays {
  margin-bottom: 6px;
}
.weekdays div {
  text-align: center;
  font-size: 12px;
  font-weight: 600;
  color: #64748b;
  padding: 8px 0 4px;
  letter-spacing: 0.3px;
}
.grid {
  width: 100%;
}
.day {
  position: relative;
  aspect-ratio: 1 / 1;
  background: #f8fafc;
  border-radius: 14px;
  border: 2px solid transparent;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  user-select: none;
  transition: all .15s;
  width: 100%;
  box-sizing: border-box;
}
.day:active { transform: scale(0.96); }
.day.empty {
  background: transparent;
  cursor: default;
  pointer-events: none;
}
.day .num {
  font-size: 16px;
  font-weight: 500;
  line-height: 1;
}
.day.today {
  border-color: #2563eb;
  background: #eff6ff;
}
.day.today .num {
  font-weight: 700;
  color: #1d4ed8;
}
.day .hoje {
  position: absolute;
  bottom: 5px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 9px;
  font-weight: 800;
  color: #2563eb;
  text-transform: uppercase;
  letter-spacing: 0.4px;
  line-height: 1;
}
.day.selected {
  outline: 2px solid #0f172a;
  outline-offset: -2px;
}
.day.has-event::after {
  content: '';
  position: absolute;
  top: 7px;
  right: 7px;
  width: 6px;
  height: 6px;
  background: #2563eb;
  border-radius: 50%;
}
.events {
  margin-top: 22px;
  background: #f8fafc;
  border-radius: 18px;
  padding: 16px;
  min-height: 110px;
}
.events h3 {
  margin: 0 0 12px;
  font-size: 15px;
  font-weight: 700;
  text-transform: capitalize;
  color: #334155;
}
#eventsList {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.event-item {
  display: flex;
  align-items: center;
  gap: 10px;
  background: #ffffff;
  padding: 12px 14px;
  border-radius: 12px;
  box-shadow: 0 1px 2px rgba(15,23,42,0.04);
  cursor: pointer;
}
.event-time {
  font-weight: 700;
  color: #2563eb;
  font-variant-numeric: tabular-nums;
  font-size: 14px;
  min-width: 52px;
}
.event-title {
  flex: 1;
  font-size: 14px;
  color: #0f172a;
}
.empty-msg {
  color: #94a3b8;
  font-size: 14px;
  text-align: center;
  padding: 14px 0;
}
#export {
  width: 100%;
  margin-top: 18px;
  padding: 15px;
  background: #0f172a;
  color: #fff;
  border: none;
  border-radius: 14px;
  font-weight: 700;
  font-size: 15px;
  cursor: pointer;
  transition: opacity .15s;
}
#export:active { opacity: 0.85; }
@media (min-width: 480px) {
  .day .num { font-size: 17px; }
  header h1 { font-size: 24px; }
}
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>Meu Calendário v9</h1>
    <div class="nav">
      <button id="prev" aria-label="Mês anterior">‹</button>
      <h2 id="monthYear"></h2>
      <button id="next" aria-label="Próximo mês">›</button>
    </div>
  </header>

  <div class="calendar">
    <div class="weekdays">
      <div>DOM</div><div>SEG</div><div>TER</div><div>QUA</div><div>QUI</div><div>SEX</div><div>SAB</div>
    </div>
    <div id="grid" class="grid"></div>
  </div>

  <section class="events">
    <h3 id="eventsTitle"></h3>
    <div id="eventsList"></div>
  </section>

  <button id="export">Exportar .ics</button>
</div>

<script>
(() => {
  const monthYear = document.getElementById('monthYear');
  const grid = document.getElementById('grid');
  const prev = document.getElementById('prev');
  const next = document.getElementById('next');
  const eventsTitle = document.getElementById('eventsTitle');
  const eventsList = document.getElementById('eventsList');
  const exportBtn = document.getElementById('export');

  const STORAGE = 'meu-calendario-v9';
  const today = new Date();
  const fmt = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  
  let view = new Date(today.getFullYear(), today.getMonth(), 1);
  let selected = fmt(today);

  const load = () => { try { return JSON.parse(localStorage.getItem(STORAGE) || '[]'); } catch { return []; } };
  const save = (e) => localStorage.setItem(STORAGE, JSON.stringify(e));

  function render() {
    const year = view.getFullYear();
    const month = view.getMonth();
    
    monthYear.textContent = view.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });
    
    grid.innerHTML = '';
    const first = new Date(year, month, 1).getDay();
    const days = new Date(year, month + 1, 0).getDate();
    const total = Math.ceil((first + days) / 7) * 7;
    const events = load();
    const todayStr = fmt(today);

    for (let i = 0; i < total; i++) {
      const cell = document.createElement('div');
      cell.className = 'day';
      
      if (i < first || i >= first + days) {
        cell.classList.add('empty');
        grid.appendChild(cell);
        continue;
      }
      
      const dayNum = i - first + 1;
      const date = new Date(year, month, dayNum);
      const dateStr = fmt(date);
      
      cell.dataset.date = dateStr;
      cell.innerHTML = `<span class="num">${dayNum}</span>`;
      
      if (dateStr === todayStr) {
        cell.classList.add('today');
        cell.innerHTML += `<span class="hoje">hoje</span>`;
      }
      if (dateStr === selected) cell.classList.add('selected');
      if (events.some(e => e.date === dateStr)) cell.classList.add('has-event');
      
      cell.addEventListener('click', () => {
        selected = dateStr;
        render();
        setTimeout(() => addEvent(dateStr), 30);
      });
      
      grid.appendChild(cell);
    }
    renderEvents();
  }

  function renderEvents() {
    const d = new Date(selected + 'T00:00:00');
    eventsTitle.textContent = d.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });
    
    const evts = load().filter(e => e.date === selected).sort((a,b) => a.time.localeCompare(b.time));
    eventsList.innerHTML = '';
    
    if (!evts.length) {
      eventsList.innerHTML = `<div class="empty-msg">Nenhum evento neste dia. Toque em um dia para adicionar.</div>`;
      return;
    }
    
    evts.forEach(ev => {
      const div = document.createElement('div');
      div.className = 'event-item';
      div.innerHTML = `<span class="event-time">${ev.time}</span><span class="event-title">${ev.title}</span>`;
      div.addEventListener('click', () => {
        if (confirm(`Remover "${ev.title}" às ${ev.time}?`)) {
          save(load().filter(x => x.id !== ev.id));
          render();
        }
      });
      eventsList.appendChild(div);
    });
  }

  function addEvent(dateStr) {
    const titulo = prompt('Título do evento:');
    if (!titulo || !titulo.trim()) return;
    
    let hora = prompt('Horário (HH:MM):');
    if (!hora) return;
    hora = hora.trim();
    
    if (!/^\d{2}:\d{2}$/.test(hora)) {
      alert('Horário inválido. Use formato HH:MM');
      return;
    }
    const [h, m] = hora.split(':').map(Number);
    if (h < 0 || h > 23 || m < 0 || m > 59) {
      alert('Horário inválido.');
      return;
    }
    
    const evts = load();
    evts.push({
      id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
      date: dateStr,
      title: titulo.trim(),
      time: `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`
    });
    save(evts);
    render();
  }

  prev.addEventListener('click', () => { view.setMonth(view.getMonth() - 1); render(); });
  next.addEventListener('click', () => { view.setMonth(view.getMonth() + 1); render(); });

  exportBtn.addEventListener('click', () => {
    const evts = load().sort((a,b) => a.date.localeCompare(b.date) || a.time.localeCompare(b.time));
    if (!evts.length) { alert('Nenhum evento para exportar.'); return; }
    
    const pad = n => String(n).padStart(2,'0');
    const now = new Date();
    const dtstamp = `${now.getUTCFullYear()}${pad(now.getUTCMonth()+1)}${pad(now.getUTCDate())}T${pad(now.getUTCHours())}${pad(now.getUTCMinutes())}${pad(now.getUTCSeconds())}Z`;
    
    let ics = 'BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//Meu Calendario v9//pt-BR//\r\nCALSCALE:GREGORIAN\r\n';
    
    evts.forEach(ev => {
      const [y, mo, d] = ev.date.split('-').map(Number);
      const [hh, mm] = ev.time.split(':').map(Number);
      const start = new Date(y, mo - 1, d, hh, mm, 0);
      const end = new Date(start.getTime() + 60*60*1000);
      const fmtICS = dt => `${dt.getFullYear()}${pad(dt.getMonth()+1)}${pad(dt.getDate())}T${pad(dt.getHours())}${pad(dt.getMinutes())}00`;
      
      ics += `BEGIN:VEVENT\r\nUID:${ev.id}@meucalendariov9\r\nDTSTAMP:${dtstamp}\r\nDTSTART:${fmtICS(start)}\r\nDTEND:${fmtICS(end)}\r\nSUMMARY:${ev.title.replace(/[\r\n]/g,' ')}\r\nEND:VEVENT\r\n`;
    });
    
    ics += 'END:VCALENDAR';
    const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'meu-calendario-v9.ics';
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  });

  render();
})();
</script>
<script>(function(){document.addEventListener("click",function(e){var a=e.target.closest("[data-product-id]");if(!a)return;e.preventDefault();var pid=a.getAttribute("data-product-id");if(pid)parent.postMessage({type:"ecto-artifact-link-click",productId:pid},"*")})})();</script>
<script>(function(){var loc=location.href.replace(/#.*$/,"");var ATTR_NAMES=["data-product-id","data-productid","data-product_id","product-id","productid","product_id","data-source-entity-id","source-entity-id","source_entity_id","data-product","data-metadata","data-meta"];var DATASET_KEYS=["productId","productid","product_id","sourceEntityId","sourceentityid","source_entity_id","product","metadata","meta"];function readProductId(value){if(typeof value!=="string"||value.length===0)return null;if(/^[0-9]{6,}$/.test(value))return value;var match=value.match(/(?:product(?:_|-)?id|source(?:_|-)?entity(?:_|-)?id)["'=:\s]+([0-9]{6,})/i);return match?match[1]:null}function extractProductId(start){for(var node=start;node&&node!==document.body;node=node.parentElement){for(var i=0;i<ATTR_NAMES.length;i++){var attrValue=node.getAttribute&&node.getAttribute(ATTR_NAMES[i]);var attrProductId=readProductId(attrValue);if(attrProductId)return attrProductId}var dataset=node.dataset||null;if(dataset){for(var j=0;j<DATASET_KEYS.length;j++){var dataValue=dataset[DATASET_KEYS[j]];var dataProductId=readProductId(dataValue);if(dataProductId)return dataProductId}}}return null}document.addEventListener("click",function(e){var target=e.target instanceof Element?e.target:null;if(!target)return;var a=target.closest?target.closest("a[href]"):null;if(!a||!a.href||!/^https?:\/\//.test(a.href))return;if(a.href.replace(/#.*$/,"")===loc)return;var productId=extractProductId(target)||extractProductId(a);if(!productId)return;e.preventDefault();parent.postMessage({type:"ecto-artifact-link-click",productId:productId},"*")},true)})();</script></body>
</html>
